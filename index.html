<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q4 Drill 1</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f2027, #f12711, #f56600);
            font-family: Arial, sans-serif;
            color: white;
        }

        .card {
            background-color: #873131;
            border-radius: 15px;
        }

        input {
            text-align: center;
        }

        button {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container text-center mt-5">
    <h1 class="text-warning">Heat Index Checker</h1>
    <p>Enter temperature and humidity to know how hot it is.</p>

   

    <div id="instructions" class="alert alert-secondary" style="display:none;">
        Enter temperature (°C) and humidity (%), then click CHECK.
    </div>

    <div class="card p-4 mx-auto shadow" style="max-width:400px;">
        <h4>Input Values</h4>

        <input type="number" id="temp" class="form-control mb-2" placeholder="Temperature (°C)">
        <input type="number" id="humidity" class="form-control mb-2" placeholder="Humidity (%)">

        <button class="btn btn-warning" onclick="calculate()">Check</button>

        <h5 class="mt-3" id="result"></h5>
    </div>

   
    </p>
</div>

<script>

function toggleInstructions() {
    let box = document.getElementById("instructions");

    if (box.style.display === "none") {
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}


function calculate() {

    let temperature = parseFloat(document.getElementById("temp").value);
    let humidity = parseFloat(document.getElementById("humidity").value);

    
    if (isNaN(temperature) || isNaN(humidity)) {
        alert("Please enter valid numbers!");
        return;
    }

    let heatIndex = temperature + (0.33 * humidity) - 4;

    let status = "";

    
    if (heatIndex <= 27) {
        status = "Comfortable / Cool";
    } 
    else if (heatIndex <= 32) {
        status = "Warm";
    } 
    else if (heatIndex <= 37) {
        status = "Hot";
    } 
    else if (heatIndex <= 41) {
        status = "Very Hot / Caution";
    } 
    else {
        status = "Extreme Heat / Danger";
    }

    document.getElementById("result").innerHTML =
        "Heat Index: " + heatIndex.toFixed(2) + "°C <br>Status: " + status;
}
</script>

</body>
</html>
